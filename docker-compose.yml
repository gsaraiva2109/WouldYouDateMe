services:
  app:
    image: ghcr.io/gsaraiva2109/wouldyoudateme:latest
    pull_policy: always
    container_name: wouldyoudateme
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Personal content, provided via Dokploy → Advanced → Mounts → File Mount.
      # Create a File Mount named "config.json" (paste real config) — Dokploy stores
      # it under ../files/ next to this compose; this line mounts it into the app.
      - ../files/config.json:/app/public/config.json:ro
      # Persist her answers (sqlite + jsonl) outside the container.
      - ./data:/app/data
