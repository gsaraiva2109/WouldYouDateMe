services:
  app:
    image: ghcr.io/gsaraiva2109/wouldyoudateme:latest
    pull_policy: always
    container_name: wouldyoudateme
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persistent volume: holds the answers DB/JSONL *and* the personal config.json.
      # Drop your real config.json in here (next to answers.db) and the backend
      # serves it as /config.json — no rebuild, no fragile single-file mount.
      - ./data:/app/data
